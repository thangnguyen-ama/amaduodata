<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ama Duo Data — Mobile UI Kit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; min-height: 100%; }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 36px 20px 80px;
      font-family: var(--font-body);
    }
    .hd { max-width: 480px; text-align: center; margin-bottom: 24px; }
    .hd img { height: 36px; }
    .hd p { font-size: 14px; color: var(--fg-muted); margin: 10px 0 0; }
    .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    /* Device frame outer shadow needs adjusting on dark */
    .device-wrap { position: relative; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="hd">
    <img src="../../assets/logo-dark.svg" alt="Ama Duo Data">
    <p>Mobile UI kit · daily 5-minute data lessons</p>
  </div>

  <div id="root" class="stage"></div>

  <!-- frame + components -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="Atoms.jsx"></script>
  <script type="text/babel" src="LearnPath.jsx"></script>
  <script type="text/babel" src="LessonScreen.jsx"></script>
  <script type="text/babel" src="Celebration.jsx"></script>
  <script type="text/babel" src="LeagueScreen.jsx"></script>
  <script type="text/babel" src="ProfileScreen.jsx"></script>
  <script type="text/babel" src="PracticeScreen.jsx"></script>
  <script type="text/babel" src="StatsScreen.jsx"></script>

  <script type="text/babel">
    function App() {
      // 'tab' is the main app state. Stack: lesson > celebration > tab content.
      const [tab, setTab]   = React.useState('learn');     // learn | practice | stats | league | me
      const [mode, setMode] = React.useState('tab');       // tab | lesson | celebrate

      function startLesson() { setMode('lesson'); }
      function finishLesson() { setMode('celebrate'); }
      function backToTabs() { setMode('tab'); }

      let inner = null;
      if (mode === 'lesson') {
        inner = <LessonScreen onExit={backToTabs} onComplete={finishLesson} />;
      } else if (mode === 'celebrate') {
        inner = <Celebration correct={9} total={10} xp={15} onContinue={backToTabs} />;
      } else if (tab === 'learn')    inner = <LearnPath onStartLesson={startLesson} />;
      else if (tab === 'practice')   inner = <PracticeScreen onStart={startLesson} />;
      else if (tab === 'stats')      inner = <StatsScreen />;
      else if (tab === 'league')     inner = <LeagueScreen />;
      else if (tab === 'me')         inner = <ProfileScreen />;

      const showChrome = mode === 'tab';

      return (
        <div data-screen-label={`mobile / ${mode === 'tab' ? tab : mode}`}>
          <IOSDevice width={390} height={844} dark={true}>
            <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
              {/* status-bar spacer (frame puts SB absolute on top) */}
              <div style={{ height: 50 }} />
              {showChrome && (
                <div style={{ borderBottom: '1px solid var(--border)' }}>
                  <TopBar streak={147} xp={2840} hearts={4} />
                </div>
              )}
              <div style={{ flex: 1, overflow: 'auto', position: 'relative' }}>
                {inner}
              </div>
              {showChrome && <BottomNav active={tab} onChange={setTab} />}
            </div>
          </IOSDevice>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
