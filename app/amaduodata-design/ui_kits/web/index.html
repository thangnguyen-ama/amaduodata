<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ama Duo Data — Creator Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; min-width: 1180px; }
    #app { height: 100vh; display: flex; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>

  <script type="text/babel" src="WebAtoms.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="Topbar.jsx"></script>
  <script type="text/babel" src="DashboardScreen.jsx"></script>
  <script type="text/babel" src="LessonsScreen.jsx"></script>
  <script type="text/babel" src="TeamScreen.jsx"></script>

  <script type="text/babel">
    function App() {
      const [tab, setTab] = React.useState('dashboard');

      const titles = {
        dashboard: { title: 'Overview',     crumb: 'Home' },
        lessons:   { title: 'Lessons',      crumb: 'Content · 32 lessons' },
        units:     { title: 'Units',        crumb: 'Content · 4 units' },
        team:      { title: 'Team',         crumb: 'People · 147 learners' },
        insights:  { title: 'Insights',     crumb: 'Analytics' },
      };

      let inner;
      if (tab === 'dashboard') inner = <DashboardScreen />;
      else if (tab === 'lessons') inner = <LessonsScreen />;
      else if (tab === 'team') inner = <TeamScreen />;
      else inner = (
        <div style={{ padding: 28, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', gap: 14 }}>
          <img src="../../assets/mascot-beat.svg" style={{ height: 140 }} />
          <div style={{ font: '800 22px var(--font-display)', color: 'var(--ink-900)' }}>Coming soon.</div>
          <div style={{ font: '15px var(--font-body)', color: 'var(--fg-muted)', textAlign: 'center', maxWidth: 380 }}>
            This kit demos three screens — Dashboard, Lessons, and Team. Switch between them on the left.
          </div>
        </div>
      );

      const t = titles[tab];
      return (
        <div data-screen-label={`web / ${tab}`} style={{ display: 'flex', flex: 1, height: '100vh', overflow: 'hidden' }}>
          <Sidebar active={tab} onChange={setTab} />
          <main style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            <Topbar title={t.title} breadcrumb={t.crumb} />
            <div style={{ flex: 1, overflow: 'auto', background: 'var(--paper)' }}>
              {inner}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>
</body>
</html>
