<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Inputs</div>
      <span class="muted">1.5px border · 14px radius · clear focus</span>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px;">
      <div style="display:flex; flex-direction:column; gap:6px;">
        <label style="font:600 12px var(--font-mono); letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-muted);">Email</label>
        <input style="font-family:var(--font-body); font-size:15px; padding:12px 14px; border-radius:14px; border:1.5px solid var(--ink-200); background:#fff; outline:none;" value="alex@amanotes.com">
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <label style="font:600 12px var(--font-mono); letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-muted);">Focus</label>
        <input style="font-family:var(--font-body); font-size:15px; padding:12px 14px; border-radius:14px; border:1.5px solid var(--violet-500); background:#fff; outline:none; box-shadow:var(--ring-focus);" value="Magic Tiles 3">
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <label style="font:600 12px var(--font-mono); letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-muted);">Disabled</label>
        <input style="font-family:var(--font-body); font-size:15px; padding:12px 14px; border-radius:14px; border:1.5px solid var(--ink-100); background:var(--ink-50); color:var(--ink-300); outline:none;" value="locked" disabled>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <label style="font:600 12px var(--font-mono); letter-spacing:0.06em; text-transform:uppercase; color:var(--danger);">Error</label>
        <input style="font-family:var(--font-body); font-size:15px; padding:12px 14px; border-radius:14px; border:1.5px solid var(--danger); background:#fff; outline:none;" value="0">
      </div>
    </div>
  </div>
</body></html>
