<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:16px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Lesson tiles</div>
      <span class="muted">round chunky path tile · 4 states</span>
    </div>
    <div style="display:flex; gap:28px; align-items:center; padding:8px 4px 20px;">
      <!-- locked -->
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <button style="width:78px; height:78px; border-radius:50%; background:var(--ink-100); color:var(--ink-300); border:none; box-shadow:0 4px 0 0 var(--ink-200); cursor:not-allowed; display:flex; align-items:center; justify-content:center; font:800 26px var(--font-display);">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        </button>
        <span class="muted">Locked</span>
      </div>
      <!-- available -->
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <button style="width:78px; height:78px; border-radius:50%; background:var(--violet-500); color:#fff; border:none; box-shadow:var(--shadow-base-violet); cursor:pointer; display:flex; align-items:center; justify-content:center;">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <span class="muted">Start</span>
      </div>
      <!-- in-progress -->
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px; position:relative;">
        <svg width="92" height="92" viewBox="0 0 92 92" style="position:absolute; top:-7px; left:-7px;"><circle cx="46" cy="46" r="42" stroke="var(--ink-100)" stroke-width="6" fill="none"/><circle cx="46" cy="46" r="42" stroke="var(--violet-500)" stroke-width="6" fill="none" stroke-dasharray="263.9" stroke-dashoffset="80" stroke-linecap="round" transform="rotate(-90 46 46)"/></svg>
        <button style="width:78px; height:78px; border-radius:50%; background:var(--violet-500); color:#fff; border:none; box-shadow:var(--shadow-base-violet); cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative;">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <span class="muted">In progress</span>
      </div>
      <!-- complete -->
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <button style="width:78px; height:78px; border-radius:50%; background:var(--blue-400); color:var(--blue-900); border:none; box-shadow:var(--shadow-base-blue); cursor:pointer; display:flex; align-items:center; justify-content:center;">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <span class="muted">Done</span>
      </div>
      <!-- bonus -->
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <button style="width:78px; height:78px; border-radius:50%; background:var(--sun-400); color:var(--sun-900); border:none; box-shadow:var(--shadow-base-sun); cursor:pointer; display:flex; align-items:center; justify-content:center;">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9"/></svg>
        </button>
        <span class="muted">Bonus</span>
      </div>
    </div>
  </div>
</body></html>
