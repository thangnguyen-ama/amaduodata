<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:20px 28px;">
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Pulse Violet</div>
      <span class="muted">the hero · ~12% of UI</span>
    </div>
    <div style="display:flex; gap:6px;">
      <div style="flex:1; height:80px; border-radius:10px; background:var(--violet-50);  display:flex; align-items:flex-end; padding:6px; font:11px var(--font-mono); color:#444;">50</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--violet-100); display:flex; align-items:flex-end; padding:6px; font:11px var(--font-mono); color:#333;">100</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--violet-200); display:flex; align-items:flex-end; padding:6px; font:11px var(--font-mono); color:#222;">200</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--violet-300); display:flex; align-items:flex-end; padding:6px; font:11px var(--font-mono); color:#fff;">300</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--violet-400); display:flex; align-items:flex-end; padding:6px; font:11px var(--font-mono); color:#fff;">400</div>
      <div style="flex:1.6; height:80px; border-radius:10px; background:var(--violet-500); display:flex; align-items:flex-end; justify-content:space-between; padding:6px 10px; font:11px var(--font-mono); color:#fff;"><span>500</span><span>#6938EF</span></div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--violet-600); display:flex; align-items:flex-end; padding:6px; font:11px var(--font-mono); color:#fff;">600</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--violet-700); display:flex; align-items:flex-end; padding:6px; font:11px var(--font-mono); color:#fff;">700</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--violet-800); display:flex; align-items:flex-end; padding:6px; font:11px var(--font-mono); color:#fff;">800</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--violet-900); display:flex; align-items:flex-end; padding:6px; font:11px var(--font-mono); color:#fff;">900</div>
    </div>
  </div>
</body></html>
