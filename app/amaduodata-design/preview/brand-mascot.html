<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Beat</div>
      <span class="muted">mascot · idle + celebrate · simple violet squircle</span>
    </div>
    <div style="display:flex; gap:24px; align-items:center; justify-content:center; padding:8px 0 16px;">
      <div style="background:var(--paper-warm); border-radius:20px; padding:14px 24px; display:flex; align-items:center; justify-content:center;">
        <img src="../assets/mascot-beat.svg" style="height:200px;">
      </div>
      <div style="background:var(--violet-50); border-radius:20px; padding:14px 24px; display:flex; align-items:center; justify-content:center;">
        <img src="../assets/mascot-beat-celebrate.svg" style="height:200px;">
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; max-width:200px;">
        <div style="font:700 14px var(--font-display); color:var(--ink-900);">"Nice streak."</div>
        <div style="font:13px var(--font-body); color:var(--fg-muted);">Beat speaks in 3–8 words. Always lowercase confidence. Never shouty.</div>
      </div>
    </div>
  </div>
</body></html>
