<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Spacing scale</div>
      <span class="muted">4px base · use freely · no off-scale</span>
    </div>
    <div style="display:flex; align-items:flex-end; gap:10px;">
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:4px;  width:4px;  background:var(--violet-500); border-radius:2px;"></div><span class="muted">4</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:8px;  width:8px;  background:var(--violet-500); border-radius:2px;"></div><span class="muted">8</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:12px; width:12px; background:var(--violet-500); border-radius:3px;"></div><span class="muted">12</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:16px; width:16px; background:var(--violet-500); border-radius:3px;"></div><span class="muted">16</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:20px; width:20px; background:var(--violet-500); border-radius:4px;"></div><span class="muted">20</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:24px; width:24px; background:var(--violet-500); border-radius:5px;"></div><span class="muted">24</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:32px; width:32px; background:var(--violet-500); border-radius:6px;"></div><span class="muted">32</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:40px; width:40px; background:var(--violet-500); border-radius:8px;"></div><span class="muted">40</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:48px; width:48px; background:var(--violet-500); border-radius:10px;"></div><span class="muted">48</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:64px; width:64px; background:var(--violet-500); border-radius:12px;"></div><span class="muted">64</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:80px; width:80px; background:var(--violet-500); border-radius:14px;"></div><span class="muted">80</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="height:96px; width:96px; background:var(--violet-500); border-radius:16px;"></div><span class="muted">96</span></div>
    </div>
  </div>
</body></html>
