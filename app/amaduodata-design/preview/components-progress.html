<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:16px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Progress</div>
      <span class="muted">linear · segmented · ring</span>
    </div>
    <div style="display:flex; flex-direction:column; gap:14px;">
      <!-- linear -->
      <div style="display:flex; flex-direction:column; gap:6px;">
        <div style="display:flex; justify-content:space-between; font:600 12px var(--font-mono); color:var(--fg-muted);"><span>LESSON 3 OF 5</span><span>60%</span></div>
        <div style="height:14px; background:var(--ink-100); border-radius:999px; overflow:hidden; position:relative;">
          <div style="width:60%; height:100%; background:var(--blue-400); border-radius:999px; position:relative;">
            <div style="position:absolute; top:3px; left:6px; right:6px; height:3px; background:rgba(255,255,255,0.55); border-radius:999px;"></div>
          </div>
        </div>
      </div>
      <!-- segmented -->
      <div style="display:flex; flex-direction:column; gap:6px;">
        <div style="display:flex; justify-content:space-between; font:600 12px var(--font-mono); color:var(--fg-muted);"><span>STEP 4 OF 7</span></div>
        <div style="display:flex; gap:6px;">
          <div style="flex:1; height:8px; background:var(--blue-400); border-radius:999px;"></div>
          <div style="flex:1; height:8px; background:var(--blue-400); border-radius:999px;"></div>
          <div style="flex:1; height:8px; background:var(--blue-400); border-radius:999px;"></div>
          <div style="flex:1; height:8px; background:var(--violet-500); border-radius:999px;"></div>
          <div style="flex:1; height:8px; background:var(--ink-100); border-radius:999px;"></div>
          <div style="flex:1; height:8px; background:var(--ink-100); border-radius:999px;"></div>
          <div style="flex:1; height:8px; background:var(--ink-100); border-radius:999px;"></div>
        </div>
      </div>
    </div>
  </div>
</body></html>
