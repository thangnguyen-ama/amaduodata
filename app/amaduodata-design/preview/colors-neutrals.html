<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:20px 28px;">
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Ink &amp; Paper</div>
      <span class="muted">warm violet-tinted neutrals</span>
    </div>
    <div style="display:flex; gap:6px;">
      <div style="flex:1; height:78px; border-radius:10px; background:var(--paper);      border:1px solid var(--border); padding:6px; font:11px var(--font-mono); color:#333; display:flex; align-items:flex-end;">paper</div>
      <div style="flex:1; height:78px; border-radius:10px; background:var(--ink-50);     padding:6px; font:11px var(--font-mono); color:#333; display:flex; align-items:flex-end;">ink-50</div>
      <div style="flex:1; height:78px; border-radius:10px; background:var(--ink-100);    padding:6px; font:11px var(--font-mono); color:#333; display:flex; align-items:flex-end;">100</div>
      <div style="flex:1; height:78px; border-radius:10px; background:var(--ink-200);    padding:6px; font:11px var(--font-mono); color:#333; display:flex; align-items:flex-end;">200</div>
      <div style="flex:1; height:78px; border-radius:10px; background:var(--ink-300);    padding:6px; font:11px var(--font-mono); color:#333; display:flex; align-items:flex-end;">300</div>
      <div style="flex:1; height:78px; border-radius:10px; background:var(--ink-400);    padding:6px; font:11px var(--font-mono); color:#fff; display:flex; align-items:flex-end;">400</div>
      <div style="flex:1; height:78px; border-radius:10px; background:var(--ink-500);    padding:6px; font:11px var(--font-mono); color:#fff; display:flex; align-items:flex-end;">500</div>
      <div style="flex:1; height:78px; border-radius:10px; background:var(--ink-700);    padding:6px; font:11px var(--font-mono); color:#fff; display:flex; align-items:flex-end;">700</div>
      <div style="flex:1.5; height:78px; border-radius:10px; background:var(--ink-900);  padding:6px 10px; font:11px var(--font-mono); color:#fff; display:flex; align-items:flex-end; justify-content:space-between;"><span>ink-900</span><span>#131326</span></div>
    </div>
  </div>
</body></html>
