<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Question card</div>
      <span class="muted">multiple-choice answer · chunky tiles</span>
    </div>
    <div style="background:#fff; border:2px solid var(--ink-100); border-radius:20px; padding:18px 20px; max-width:560px;">
      <div style="font:600 12px var(--font-mono); letter-spacing:0.08em; text-transform:uppercase; color:var(--violet-500); margin-bottom:8px;">Match the definition</div>
      <div style="font:800 22px var(--font-display); color:var(--ink-900); line-height:1.2; margin-bottom:16px; letter-spacing:-0.01em;">Average revenue per <span style="color:var(--violet-500);">daily active user</span>?</div>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <button style="text-align:left; padding:12px 14px; border-radius:14px; border:2px solid var(--ink-100); background:#fff; box-shadow:0 3px 0 0 var(--ink-100); font:600 15px var(--font-body); color:var(--ink-900); cursor:pointer;">
          <span style="display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; background:var(--ink-100); color:var(--ink-700); border-radius:6px; font:700 12px var(--font-mono); margin-right:10px;">1</span>
          ARPU
        </button>
        <button style="text-align:left; padding:12px 14px; border-radius:14px; border:2px solid var(--violet-500); background:var(--violet-50); box-shadow:0 3px 0 0 var(--violet-500); font:700 15px var(--font-body); color:var(--violet-700); cursor:pointer;">
          <span style="display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; background:var(--violet-500); color:#fff; border-radius:6px; font:700 12px var(--font-mono); margin-right:10px;">2</span>
          ARPDAU
        </button>
        <button style="text-align:left; padding:12px 14px; border-radius:14px; border:2px solid var(--ink-100); background:#fff; box-shadow:0 3px 0 0 var(--ink-100); font:600 15px var(--font-body); color:var(--ink-900); cursor:pointer;">
          <span style="display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; background:var(--ink-100); color:var(--ink-700); border-radius:6px; font:700 12px var(--font-mono); margin-right:10px;">3</span>
          LTV
        </button>
      </div>
    </div>
  </div>
</body></html>
