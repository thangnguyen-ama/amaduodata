<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Corner radii</div>
      <span class="muted">7 steps · pill is the default for buttons</span>
    </div>
    <div style="display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap;">
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:60px; height:60px; background:var(--violet-200); border-radius:6px;"></div><span class="muted">xs · 6</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:60px; height:60px; background:var(--violet-300); border-radius:10px;"></div><span class="muted">sm · 10</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:60px; height:60px; background:var(--violet-400); border-radius:14px;"></div><span class="muted">md · 14</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:60px; height:60px; background:var(--violet-500); border-radius:20px;"></div><span class="muted">lg · 20</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:60px; height:60px; background:var(--violet-600); border-radius:28px;"></div><span class="muted">xl · 28</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:60px; height:60px; background:var(--violet-700); border-radius:36px;"></div><span class="muted">2xl · 36</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:60px; height:60px; background:var(--violet-800); border-radius:999px;"></div><span class="muted">pill</span></div>
    </div>
  </div>
</body></html>
