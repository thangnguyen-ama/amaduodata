<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Streak &amp; XP</div>
      <span class="muted">flame · heart · gem</span>
    </div>
    <div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
      <!-- streak -->
      <div style="display:flex; align-items:center; gap:10px; padding:10px 18px 10px 12px; background:#fff; border:1.5px solid var(--ink-100); border-radius:999px; box-shadow:var(--shadow-sm);">
        <img src="../assets/icon-flame.svg" width="28" height="28">
        <span style="font:900 22px var(--font-display); color:var(--ink-900); font-variant-numeric:tabular-nums;">147</span>
        <span style="font:600 12px var(--font-mono); letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-muted);">day streak</span>
      </div>
      <!-- xp -->
      <div style="display:flex; align-items:center; gap:10px; padding:10px 18px 10px 12px; background:var(--sun-100); border-radius:999px;">
        <img src="../assets/icon-xp.svg" width="24" height="24">
        <span style="font:900 22px var(--font-display); color:var(--sun-900); font-variant-numeric:tabular-nums;">2,840</span>
        <span style="font:700 12px var(--font-mono); letter-spacing:0.06em; text-transform:uppercase; color:var(--sun-700);">xp</span>
      </div>
      <!-- hearts -->
      <div style="display:flex; align-items:center; gap:6px; padding:10px 16px; background:#fff; border:1.5px solid var(--ink-100); border-radius:999px;">
        <img src="../assets/icon-heart.svg" width="22" height="22">
        <img src="../assets/icon-heart.svg" width="22" height="22">
        <img src="../assets/icon-heart.svg" width="22" height="22">
        <img src="../assets/icon-heart.svg" width="22" height="22" style="opacity:0.18; filter:grayscale(1);">
        <img src="../assets/icon-heart.svg" width="22" height="22" style="opacity:0.18; filter:grayscale(1);">
      </div>
    </div>
  </div>
</body></html>
