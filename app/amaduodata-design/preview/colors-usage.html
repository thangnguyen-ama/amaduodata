<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:12px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Brand tri-color</div>
      <span class="muted">violet \u00b7 blue \u00b7 pink \u2014 60/25/15 within the brand surface</span>
    </div>
    <div style="display:flex; height:80px; border-radius:14px; overflow:hidden;">
      <div style="flex:60; background:var(--violet-500); display:flex; align-items:center; justify-content:center; color:#fff; font:700 14px var(--font-display);">Violet \u00b7 60%</div>
      <div style="flex:25; background:var(--blue-400); display:flex; align-items:center; justify-content:center; color:#fff; font:700 14px var(--font-display);">Blue \u00b7 25%</div>
      <div style="flex:15; background:var(--pink-400); display:flex; align-items:center; justify-content:center; color:#fff; font:700 14px var(--font-display);">Pink \u00b7 15%</div>
    </div>
    <div style="display:flex; gap:14px; font:13px var(--font-body); color:var(--fg-muted); flex-wrap:wrap;">
      <span><strong style="color:var(--violet-500);">Violet</strong> primary CTAs, brand chrome</span>
      <span><strong style="color:var(--blue-500);">Blue</strong> streaks, progress, learning</span>
      <span><strong style="color:var(--pink-500);">Pink</strong> celebrations, hearts, accent</span>
      <span><strong style="color:var(--sun-700);">Sun</strong> XP only</span>
      <span><strong style="color:var(--green-600);">Green</strong> semantic success only</span>
    </div>
  </div>
</body></html>
