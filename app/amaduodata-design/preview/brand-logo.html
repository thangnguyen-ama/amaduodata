<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Logo</div>
      <span class="muted">light · dark · mark-only</span>
    </div>
    <div style="display:flex; gap:14px; align-items:stretch;">
      <div style="flex:1.4; background:var(--paper); padding:24px; border-radius:14px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center;">
        <img src="../assets/logo.svg" style="height:48px;">
      </div>
      <div style="flex:1.4; background:var(--ink-900); padding:24px; border-radius:14px; display:flex; align-items:center; justify-content:center;">
        <img src="../assets/logo-dark.svg" style="height:48px;">
      </div>
      <div style="flex:0.7; background:var(--violet-50); padding:24px; border-radius:14px; display:flex; align-items:center; justify-content:center;">
        <img src="../assets/mark.svg" style="height:56px;">
      </div>
    </div>
  </div>
</body></html>
