<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:20px 28px;">
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Streak Green</div>
      <span class="muted">wins · +XP · correct answer</span>
    </div>
    <div style="display:flex; gap:6px;">
      <div style="flex:1; height:80px; border-radius:10px; background:var(--green-50);  padding:6px; font:11px var(--font-mono); color:#333; display:flex; align-items:flex-end;">50</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--green-100); padding:6px; font:11px var(--font-mono); color:#222; display:flex; align-items:flex-end;">100</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--green-200); padding:6px; font:11px var(--font-mono); color:#222; display:flex; align-items:flex-end;">200</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--green-300); padding:6px; font:11px var(--font-mono); color:#222; display:flex; align-items:flex-end;">300</div>
      <div style="flex:1.6; height:80px; border-radius:10px; background:var(--green-400); padding:6px 10px; font:11px var(--font-mono); color:#082; display:flex; align-items:flex-end; justify-content:space-between;"><span>400</span><span>#29D86F</span></div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--green-500); padding:6px; font:11px var(--font-mono); color:#fff; display:flex; align-items:flex-end;">500</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--green-600); padding:6px; font:11px var(--font-mono); color:#fff; display:flex; align-items:flex-end;">600</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--green-700); padding:6px; font:11px var(--font-mono); color:#fff; display:flex; align-items:flex-end;">700</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--green-800); padding:6px; font:11px var(--font-mono); color:#fff; display:flex; align-items:flex-end;">800</div>
      <div style="flex:1; height:80px; border-radius:10px; background:var(--green-900); padding:6px; font:11px var(--font-mono); color:#fff; display:flex; align-items:flex-end;">900</div>
    </div>
  </div>
</body></html>
