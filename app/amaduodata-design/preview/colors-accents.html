<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:20px 28px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Accents</div>
      <span class="muted">Magic Pink · Sun · used sparingly</span>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div style="display:flex; gap:6px;">
        <div style="width:60px; font:600 12px var(--font-mono); color:var(--fg-muted); align-self:center;">PINK</div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--pink-100);"></div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--pink-200);"></div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--pink-300);"></div>
        <div style="flex:1.4; height:48px; border-radius:8px; background:var(--pink-400); display:flex; align-items:center; justify-content:center; color:#fff; font:600 11px var(--font-mono);">400 · #FF3D8E</div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--pink-500);"></div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--pink-600);"></div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--pink-700);"></div>
      </div>
      <div style="display:flex; gap:6px;">
        <div style="width:60px; font:600 12px var(--font-mono); color:var(--fg-muted); align-self:center;">SUN</div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--sun-100);"></div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--sun-200);"></div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--sun-300);"></div>
        <div style="flex:1.4; height:48px; border-radius:8px; background:var(--sun-400); display:flex; align-items:center; justify-content:center; color:#5a3a00; font:600 11px var(--font-mono);">400 · #FFCD3C</div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--sun-500);"></div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--sun-600);"></div>
        <div style="flex:1; height:48px; border-radius:8px; background:var(--sun-700);"></div>
      </div>
    </div>
  </div>
</body></html>
