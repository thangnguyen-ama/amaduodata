<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Badges &amp; chips</div>
      <span class="muted">pill · 999 radius · weight 600+</span>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
      <span style="font:700 12px var(--font-display); padding:6px 12px; border-radius:999px; background:var(--violet-500); color:#fff; letter-spacing:0.04em; text-transform:uppercase;">New</span>
      <span style="font:700 12px var(--font-display); padding:6px 12px; border-radius:999px; background:var(--green-100); color:var(--green-700); letter-spacing:0.04em; text-transform:uppercase;">Streak +1</span>
      <span style="font:700 12px var(--font-display); padding:6px 12px; border-radius:999px; background:var(--sun-100); color:var(--sun-700); letter-spacing:0.04em; text-transform:uppercase;">+15 XP</span>
      <span style="font:700 12px var(--font-display); padding:6px 12px; border-radius:999px; background:var(--pink-100); color:var(--pink-600); letter-spacing:0.04em; text-transform:uppercase;">Perfect</span>
      <span style="font:600 13px var(--font-body); padding:8px 14px; border-radius:999px; background:#fff; color:var(--ink-900); border:1.5px solid var(--ink-200);">Retention</span>
      <span style="font:600 13px var(--font-body); padding:8px 14px; border-radius:999px; background:var(--ink-900); color:var(--paper); ">Monetization</span>
      <span style="font:600 13px var(--font-body); padding:8px 14px; border-radius:999px; background:var(--violet-50); color:var(--violet-600); border:1.5px solid var(--violet-200);">Funnels</span>
      <span style="font:600 12px var(--font-mono); padding:4px 8px; border-radius:6px; background:var(--ink-100); color:var(--ink-700);">BETA</span>
    </div>
  </div>
</body></html>
