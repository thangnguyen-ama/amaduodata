<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Voice — do / don't</div>
      <span class="muted">encouraging · plain-spoken · slightly nerdy</span>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px;">
      <div style="background:var(--green-50); border:1.5px solid var(--green-200); border-radius:14px; padding:16px;">
        <div style="display:flex; align-items:center; gap:6px; font:700 12px var(--font-mono); letter-spacing:0.06em; color:var(--green-700); text-transform:uppercase; margin-bottom:8px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> DO
        </div>
        <div style="font:600 16px var(--font-display); color:var(--green-900); line-height:1.4;">"Right. +12 XP."</div>
        <div style="font:600 16px var(--font-display); color:var(--green-900); line-height:1.4; margin-top:6px;">"30 days. That's a habit."</div>
        <div style="font:600 16px var(--font-display); color:var(--green-900); line-height:1.4; margin-top:6px;">"Today: cohort retention."</div>
      </div>
      <div style="background:#FCE9EC; border:1.5px solid #F0B6BE; border-radius:14px; padding:16px;">
        <div style="display:flex; align-items:center; gap:6px; font:700 12px var(--font-mono); letter-spacing:0.06em; color:#7a1828; text-transform:uppercase; margin-bottom:8px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> DON'T
        </div>
        <div style="font:600 16px var(--font-display); color:#7a1828; line-height:1.4;">"AWESOME!!! 🎉🔥 +12 XP!!"</div>
        <div style="font:600 16px var(--font-display); color:#7a1828; line-height:1.4; margin-top:6px;">"You're CRUSHING IT, rockstar!"</div>
        <div style="font:600 16px var(--font-display); color:#7a1828; line-height:1.4; margin-top:6px;">"User completed daily session."</div>
      </div>
    </div>
  </div>
</body></html>
