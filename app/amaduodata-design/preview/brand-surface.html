<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:0; margin:0;">
  <div style="
    width: 100%; min-height: 380px;
    background: var(--surface-0);
    background-image:
      radial-gradient(ellipse 90% 60% at 50% -10%,  rgba(105, 56, 239, 0.35), transparent 60%),
      radial-gradient(ellipse 60% 50% at 100% 100%, rgba(255, 61, 142, 0.22), transparent 60%);
    color: var(--fg);
    padding: 28px 32px;
    display: flex; flex-direction: column; gap: 14px; justify-content: flex-end;
  ">
    <div style="font: 700 11px var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--violet-300);">Suno-style ambient</div>
    <div style="font: 800 26px var(--font-display); color: var(--paper-warm); letter-spacing: -0.02em;">Dark surface \u00b7 soft glow</div>
    <div style="font: 14px var(--font-body); color: rgba(245,245,248,0.62); max-width: 560px;">
      A single violet bloom at top + pink bloom at far bottom-right. Subtle. No animation by default \u2014 the mood comes from the surface, not motion.
    </div>
  </div>
</body></html>
