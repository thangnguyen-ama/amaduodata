<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Avatars</div>
      <span class="muted">circular · 1.5px paper ring</span>
    </div>
    <div style="display:flex; gap:14px; align-items:center;">
      <div style="width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg, var(--violet-400), var(--pink-400)); display:flex; align-items:center; justify-content:center; color:#fff; font:800 12px var(--font-display);">AT</div>
      <div style="width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg, var(--green-400), var(--sun-400)); display:flex; align-items:center; justify-content:center; color:var(--ink-900); font:800 14px var(--font-display);">MK</div>
      <div style="width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg, var(--violet-500), var(--violet-700)); display:flex; align-items:center; justify-content:center; color:#fff; font:800 18px var(--font-display); position:relative;">
        AN
        <span style="position:absolute; bottom:0; right:0; width:14px; height:14px; border-radius:50%; background:var(--green-400); border:2px solid var(--paper);"></span>
      </div>
      <div style="width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg, var(--pink-400), var(--violet-500)); display:flex; align-items:center; justify-content:center; color:#fff; font:900 22px var(--font-display);">LK</div>

      <!-- avatar stack -->
      <div style="display:flex; padding-left:12px;">
        <div style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg, var(--violet-400), var(--violet-700)); display:flex; align-items:center; justify-content:center; color:#fff; font:800 13px var(--font-display); border:2.5px solid var(--paper); margin-left:-12px;">PT</div>
        <div style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg, var(--green-400), var(--green-700)); display:flex; align-items:center; justify-content:center; color:#fff; font:800 13px var(--font-display); border:2.5px solid var(--paper); margin-left:-12px;">JN</div>
        <div style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg, var(--sun-400), var(--pink-400)); display:flex; align-items:center; justify-content:center; color:var(--ink-900); font:800 13px var(--font-display); border:2.5px solid var(--paper); margin-left:-12px;">DV</div>
        <div style="width:36px; height:36px; border-radius:50%; background:var(--ink-900); display:flex; align-items:center; justify-content:center; color:var(--paper); font:800 12px var(--font-display); border:2.5px solid var(--paper); margin-left:-12px;">+7</div>
      </div>
    </div>
  </div>
</body></html>
