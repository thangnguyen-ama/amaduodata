<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:20px 28px;">
  <div style="display:flex; flex-direction:column; gap:12px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Semantic</div>
      <span class="muted">muted, never neon</span>
    </div>
    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
      <div style="border-radius:14px; background:var(--green-50); border:1px solid var(--border); padding:14px;">
        <div style="display:flex; align-items:center; gap:8px;">
          <div style="width:14px; height:14px; border-radius:50%; background:var(--success);"></div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--green-700);">Success</div>
        </div>
        <div style="font:11px var(--font-mono); color:var(--green-700); margin-top:6px;">#14B856</div>
      </div>
      <div style="border-radius:14px; background:var(--sun-50); border:1px solid var(--border); padding:14px;">
        <div style="display:flex; align-items:center; gap:8px;">
          <div style="width:14px; height:14px; border-radius:50%; background:var(--warning);"></div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--sun-700);">Warning</div>
        </div>
        <div style="font:11px var(--font-mono); color:var(--sun-700); margin-top:6px;">#F2B41A</div>
      </div>
      <div style="border-radius:14px; background:#FCE9EC; border:1px solid var(--border); padding:14px;">
        <div style="display:flex; align-items:center; gap:8px;">
          <div style="width:14px; height:14px; border-radius:50%; background:var(--danger);"></div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px; color:#7a1828;">Danger</div>
        </div>
        <div style="font:11px var(--font-mono); color:#7a1828; margin-top:6px;">#E5364B</div>
      </div>
      <div style="border-radius:14px; background:#E7F2FC; border:1px solid var(--border); padding:14px;">
        <div style="display:flex; align-items:center; gap:8px;">
          <div style="width:14px; height:14px; border-radius:50%; background:var(--info);"></div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px; color:#0e4d80;">Info</div>
        </div>
        <div style="font:11px var(--font-mono); color:#0e4d80; margin-top:6px;">#2A8FE6</div>
      </div>
    </div>
  </div>
</body></html>
