<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body style="padding:24px 32px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:10px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px;">Toasts &amp; banners</div>
      <span class="muted">never block · 4s auto-dismiss</span>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div style="display:flex; align-items:center; gap:12px; padding:14px 18px; background:var(--ink-900); color:var(--paper); border-radius:14px; box-shadow:var(--shadow-md);">
        <div style="width:28px; height:28px; border-radius:50%; background:var(--green-400); display:flex; align-items:center; justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green-900)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <span style="font:600 14px var(--font-body);">Right. +12 XP.</span>
      </div>
      <div style="display:flex; align-items:flex-start; gap:12px; padding:14px 18px; background:var(--sun-100); color:var(--sun-900); border-radius:14px; border:1.5px solid var(--sun-300);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--sun-700)"><path d="M12 2L1 21h22L12 2zm0 7l7.5 12h-15L12 9zm-1 4v3h2v-3h-2zm0 5v2h2v-2h-2z"/></svg>
        <div style="display:flex; flex-direction:column;">
          <div style="font:700 14px var(--font-display); color:var(--sun-900);">Hearts low.</div>
          <div style="font:13px var(--font-body); color:var(--sun-700);">Wait 28 min for a refill, or practice to earn one back.</div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:12px; padding:14px 18px; background:var(--violet-50); color:var(--violet-700); border-radius:14px; border:1.5px solid var(--violet-200);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--violet-500)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        <span style="font:600 14px var(--font-body); color:var(--violet-700);">New lesson unlocked: <b>A/B testing basics.</b></span>
      </div>
    </div>
  </div>
</body></html>
